<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Shredder</title>
<style>
  :root{
    --bg:#F7F5F0; --panel:#FFFFFF; --ink:#1E2A26; --muted:#6B7570;
    --line:#E2E0D8; --accent:#3E6259; --accent2:#B5652A; --warn:#B5652A;
    --good:#3E6259; --bad:#A13D3D; --track:#EDEAE2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family: "Iowan Old Style","Georgia",serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:"Menlo","Consolas",monospace;}
  h1,h2,h3{font-family:"Iowan Old Style","Georgia",serif; font-weight:600; margin:0 0 8px;}
  .app{max-width:1000px;margin:0 auto;padding:14px 14px 60px;}
  header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  header h1{font-size:22px;letter-spacing:.2px;}
  header .tag{color:var(--muted);font-size:12px;font-family:"Menlo",monospace;text-transform:uppercase;letter-spacing:1px;}
  nav{display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--line);margin-bottom:16px;padding-bottom:0;}
  nav button{
    background:none;border:none;padding:10px 14px;font-size:13px;font-family:"Menlo",monospace;
    text-transform:uppercase;letter-spacing:.5px;color:var(--muted);cursor:pointer;white-space:nowrap;
    border-bottom:2px solid transparent;
  }
  nav button.active{color:var(--ink);border-bottom:2px solid var(--accent2);}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:640px){.grid2{grid-template-columns:1fr;}}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px;font-family:"Menlo",monospace;}
  input,select{
    width:100%;padding:7px 8px;border:1px solid var(--line);border-radius:6px;background:#FCFBF8;
    font-size:14px;font-family:inherit;color:var(--ink);
  }
  input[type=number]{font-family:"Menlo",monospace;}
  .row{display:flex;gap:10px;margin-bottom:10px;align-items:flex-end;flex-wrap:wrap;}
  .row > div{flex:1;min-width:110px;}
  button.btn{
    background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;
    font-size:13px;font-family:"Menlo",monospace;text-transform:uppercase;letter-spacing:.5px;
  }
  button.btn.secondary{background:none;color:var(--accent);border:1px solid var(--accent);}
  button.btn.danger{background:none;color:var(--bad);border:1px solid var(--bad);}
  button.btn:disabled{opacity:.4;cursor:default;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);}
  th{font-family:"Menlo",monospace;font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.5px;}
  tr.x-row{opacity:.55;}
  .pill{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-family:"Menlo",monospace;text-transform:uppercase;}
  .pill.high{background:#DCE7DE;color:var(--accent);}
  .pill.med{background:#F1E6D3;color:var(--accent2);}
  .pill.low{background:var(--track);color:var(--muted);}
  .pill.x{background:#F3DEDA;color:var(--bad);}
  .bar-wrap{background:var(--track);border-radius:6px;height:8px;overflow:hidden;margin-top:4px;}
  .bar{height:100%;border-radius:6px;background:var(--accent);}
  .bar.over{background:var(--bad);}
  .stat{display:flex;justify-content:space-between;font-size:12px;margin-top:2px;color:var(--muted);font-family:"Menlo",monospace;}
  .stat b{color:var(--ink);}
  .section-title{font-family:"Menlo",monospace;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:18px 0 8px;border-top:1px solid var(--line);padding-top:14px;}
  .section-title:first-child{border-top:none;padding-top:0;margin-top:0;}
  .person-card{border:1px solid var(--line);border-radius:8px;padding:12px;}
  .person-card h3{font-size:15px;margin-bottom:10px;color:var(--accent);}
  .small{font-size:11px;color:var(--muted);}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:8px 16px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99;font-family:"Menlo",monospace;}
  .toast.show{opacity:.92;}
  .searchbox{position:relative;}
  .flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .food-line{display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .food-line .name{flex:2;}
  .food-line input{max-width:80px;}
  .meal-slot-header{display:flex;justify-content:space-between;align-items:baseline;margin-top:16px;}
  .meal-slot-header h3{font-size:14px;color:var(--accent2);text-transform:uppercase;letter-spacing:.5px;font-family:"Menlo",monospace;}
  .daylist{max-height:340px;overflow:auto;}
  .empty{color:var(--muted);font-size:13px;font-style:italic;padding:10px 0;}
  .tag-x{cursor:pointer;}
  select.unit{max-width:70px;}
  .num-tight{width:70px;flex:none;}
  .ing-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
  .ing-row .ing-food{flex:2 1 200px;min-width:0;}
  .ing-row .ing-amount{flex:0 0 90px;}
  .ing-row .ing-amount input{width:100%;}
  .ing-row .ing-assign{flex:1 1 140px;min-width:0;}
  .ing-row .ing-del{flex:none;}

  @media(max-width:640px){
    .app{padding:10px 10px 60px;}
    header h1{font-size:19px;}
    header .tag{font-size:10px;}
    nav{gap:2px;}
    nav button{padding:10px 10px;font-size:12px;}
    .panel{padding:12px;border-radius:8px;}
    label{font-size:12px;}
    input,select{padding:10px 9px;font-size:16px;}
    .row{gap:8px;}
    .row > div{min-width:0;flex:1 1 46%;}
    .num-tight{width:auto;flex:1 1 70px;}
    button.btn{padding:11px 14px;font-size:13px;}
    table{font-size:12px;}
    th,td{padding:7px 5px;}
    .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .table-scroll table{min-width:560px;}
    .grid2{gap:10px;}
    .person-card{padding:10px;}
    .person-card h3{font-size:16px;}
    .food-line input{max-width:64px;}
    .stat{font-size:12px;}
    .toast{font-size:12px;padding:8px 14px;max-width:90%;}
    .ing-row{gap:6px;}
    .ing-row .ing-food{flex:1 1 100%;}
    .ing-row .ing-amount{flex:1 1 70px;}
    .ing-row .ing-assign{flex:2 1 120px;}
    .ing-row .ing-del button{padding:8px 12px;}
    input[type=file]{padding:6px;font-size:13px;}
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

// ---------- storage helpers ----------
const SHARED = true;
async function sget(key){ try{ const r = await window.storage.get(key, SHARED); return r ? JSON.parse(r.value) : null; }catch(e){ return null; } }
async function sset(key, val){ try{ await window.storage.set(key, JSON.stringify(val), SHARED); }catch(e){ console.error('save failed', e); toast('Save failed — try again'); } }
async function slist(prefix){ try{ const r = await window.storage.list(prefix, SHARED); return r ? r.keys : []; }catch(e){ return []; } }

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(()=>t.classList.remove('show'), 1800);
}
function uid(){ return Math.random().toString(36).slice(2,9); }
function safeRerender(renderFn){
  const root = document.getElementById('tabroot');
  const active = document.activeElement;
  const id = active && active.id;
  const start = (active && typeof active.selectionStart==='number') ? active.selectionStart : null;
  const end = (active && typeof active.selectionEnd==='number') ? active.selectionEnd : null;
  renderFn(root);
  if(id){
    const el = document.getElementById(id);
    if(el){
      el.focus();
      if(start!=null && el.setSelectionRange){ try{ el.setSelectionRange(start,end); }catch(e){} }
    }
  }
}

// ---------- default state ----------
const RANGE_TABLE = {
  sedentary:{lose:[10,12],maintain:[12,14],gain:[14,16]},
  moderate:{lose:[12,14],maintain:[14,16],gain:[16,18]},
  high:{lose:[14,16],maintain:[16,18],gain:[18,20]}
};

const DEFAULT_CONFIG = {
  people: [
    {id:'p1', name:'NJ', weightKg:70, activity:'moderate', goal:'lose', rangePoint:0},
    {id:'p2', name:'MB', weightKg:70, activity:'moderate', goal:'lose', rangePoint:0}
  ],
  macroSplit: {protein:30, carb:45, fat:25}, // %
  mealSplit: {breakfast:20, lunch:35, dinner:45} // %
};

let STATE = {
  config: null,
  foods: {}, // id -> food object
  logs: {},  // dateStr -> [entries]
  tab: 'log',
  currentDate: todayStr()
};

// ---------- config math ----------
function calRangeFor(person){
  const lb = person.weightKg * 2.20462;
  const [lo,hi] = RANGE_TABLE[person.activity][person.goal];
  const low = lb*lo, high = lb*hi;
  const pt = clamp(person.rangePoint,0,100)/100;
  const chosen = low + (high-low)*pt;
  return {low, high, chosen};
}
function personTargets(person, cfg){
  const {chosen} = calRangeFor(person);
  const cal = chosen;
  const protein = (cal * cfg.macroSplit.protein/100)/4;
  const carb = (cal * cfg.macroSplit.carb/100)/4;
  const fat = (cal * cfg.macroSplit.fat/100)/9;
  return {cal, protein, carb, fat};
}
function mealTargets(person, cfg){
  const day = personTargets(person, cfg);
  const out = {};
  ['breakfast','lunch','dinner'].forEach(m=>{
    const pct = cfg.mealSplit[m]/100;
    out[m] = {cal:day.cal*pct, protein:day.protein*pct, carb:day.carb*pct, fat:day.fat*pct};
  });
  return {day, meals:out};
}
function suggestedSplit(cfg){
  const t = cfg.people.map(p=>personTargets(p,cfg).cal);
  const total = t[0]+t[1];
  if(total<=0) return [50,50];
  return [Math.round(t[0]/total*100), Math.round(t[1]/total*100)];
}

// ---------- food math ----------
function unitBasis(unit){ return (unit==='g'||unit==='ml') ? 100 : 1; }
function unitLabel(unit){
  if(unit==='g') return '100g';
  if(unit==='ml') return '100ml';
  if(unit==='tsp') return '1 tsp';
  if(unit==='tbsp') return '1 tbsp';
  return unit;
}
function scaleFood(food, amount){
  const f = amount/unitBasis(food.unit);
  const out = {};
  NUTS.forEach(n=> out[n] = (food[n]||0)*f);
  return out;
}
function pRatio(food){
  const denom = (food.protein||0)+(food.carb||0)+(food.fat||0);
  if(denom<=0) return 0;
  return (food.protein||0)/denom;
}
function pRatioPill(food){
  const r = pRatio(food);
  const pct = Math.round(r*100);
  let cls = 'low';
  if(r>0.6) cls='high'; else if(r>=0.3) cls='med';
  return `<span class="pill ${cls}">P ${pct}%</span>`;
}

// ---------- render root ----------
async function loadAll(){
  STATE.config = await sget('config') || DEFAULT_CONFIG;
  if(STATE.config.people[0].name !== 'NJ' || STATE.config.people[1].name !== 'MB'){
    STATE.config.people[0].name = 'NJ';
    STATE.config.people[1].name = 'MB';
    await sset('config', STATE.config);
  }
  STATE.foods = await sget('foods-list') || {};
  const existingHoney = Object.values(STATE.foods).find(f=>f.name==='Honey' && f.unit==='g');
  if(existingHoney){
    existingHoney.unit = 'tsp';
    existingHoney.cal = round1(existingHoney.cal*0.07*10)/10;
    existingHoney.carb = Math.round(existingHoney.carb*0.07*10)/10;
    existingHoney.fat = Math.round(existingHoney.fat*0.07*10)/10;
    existingHoney.protein = Math.round(existingHoney.protein*0.07*100)/100;
    existingHoney.fibre = Math.round(existingHoney.fibre*0.07*100)/100;
    existingHoney.sugar = Math.round(existingHoney.sugar*0.07*10)/10;
    existingHoney.salt = Math.round(existingHoney.salt*0.07*10000)/10000;
    await sset('foods-list', STATE.foods);
    toast('Honey switched to per-tsp values');
  }
  if(Object.keys(STATE.foods).length === 0 && SEED_FOODS.length){
    SEED_FOODS.forEach(f=>{
      const id = uid();
      STATE.foods[id] = {id, ...f};
    });
    await sset('foods-list', STATE.foods);
    toast('Imported ' + SEED_FOODS.length + ' items from your spreadsheet');
  }
  const logKeys = await slist('log:');
  STATE.logs = {};
  for(const k of logKeys){
    const date = k.replace('log:','');
    const v = await sget(k);
    if(v) STATE.logs[date] = v;
  }
  render();
}

  const app = document.getElementById('app');
  app.innerHTML = `
    <header>
      <h1>Shredder</h1>
      <div class="tag">Shared &middot; ${STATE.config.people.map(p=>p.name).join(' + ')}</div>

      ${tabBtn('log','Plan &amp; Log')}
      ${tabBtn('today','Today')}
      ${tabBtn('week','Week')}
      ${tabBtn('build','Batch Cook')}
      ${tabBtn('config','Config')}
      ${tabBtn('foods','Master List')}
      ${tabBtn('data','Data')}
    </nav>
    <div id="tabroot"></div>
  `;
  const root = document.getElementById('tabroot');
  if(STATE.tab==='config') renderConfig(root);
  else if(STATE.tab==='foods') renderFoods(root);
  else if(STATE.tab==='build') renderBuild(root);
  else if(STATE.tab==='log') renderLog(root);

  else if(STATE.tab==='week') renderWeek(root);
  else if(STATE.tab==='data') renderData(root);
}

}

function livePersonRange(i){
  const weightKg = parseFloat(document.getElementById(`p${i}-weight`).value)||0;
  const goal = document.getElementById(`p${i}-goal`).value;
  const activity = document.getElementById(`p${i}-activity`).value;
  const rangePoint = clamp(parseFloat(document.getElementById(`p${i}-point`).value)||0, 0, 100);
  const lb = weightKg * 2.20462;
  const [lo,hi] = RANGE_TABLE[activity][goal];
  const low = lb*lo, high = lb*hi;
  const chosen = low + (high-low)*(rangePoint/100);
  document.getElementById(`p${i}-rangeline`).innerHTML = `Point on range: ${round0(low)} — ${round0(high)} cal &middot; chosen <b class="mono">${round0(chosen)}</b>`;
  document.getElementById(`p${i}-pointval`).textContent = rangePoint+'%';
}

function checkSplitSums(){
  const macroSum = (parseFloat(document.getElementById('ms-protein').value)||0) + (parseFloat(document.getElementById('ms-carb').value)||0) + (parseFloat(document.getElementById('ms-fat').value)||0);
  const mealSum = (parseFloat(document.getElementById('sp-breakfast').value)||0) + (parseFloat(document.getElementById('sp-lunch').value)||0) + (parseFloat(document.getElementById('sp-dinner').value)||0);
  const macroOk = Math.abs(macroSum-100)<0.5;
  const mealOk = Math.abs(mealSum-100)<0.5;
  document.getElementById('macro-sum-warn').innerHTML = macroOk
    ? `<span style="color:var(--good);">Sums to ${round0(macroSum)}%</span>`
    : `<span style="color:var(--bad);">Sums to ${round0(macroSum)}% — must total 100%</span>`;
  document.getElementById('meal-sum-warn').innerHTML = mealOk
    ? `<span style="color:var(--good);">Sums to ${round0(mealSum)}%</span>`
    : `<span style="color:var(--bad);">Sums to ${round0(mealSum)}% — must total 100%</span>`;
  document.getElementById('save-config-btn').disabled = !(macroOk && mealOk);
  return macroOk && mealOk;
}
async function saveConfig(){

function computeBuildTotals(){
  const totals = {grams:0}; NUTS.forEach(n=>totals[n]=0);
  buildLines.forEach(l=>{

    if(!f || !l.grams) return;
    const s = scaleFood(f, l.grams);
    NUTS.forEach(n=> totals[n]+=s[n]);
    totals.grams += l.grams;
  });
  return totals;
}

  if(totals.grams<=0){ toast('Add ingredients with grams first'); return; }
  const cookedNum = parseFloat(buildCookedWeight)||0;
  const finalWeight = cookedNum>0 ? cookedNum : totals.grams;
  const per100 = {};
  NUTS.forEach(n=> per100[n] = totals[n]/finalWeight*100);
  const meal = {
    id: uid(), name: `Meal: ${name} (${date})`, unit:'g', isMeal:true, isX:false,
    batchDate: date, batchWeight: finalWeight, rawWeight: totals.grams,
    ...per100
  };
  STATE.foods[meal.id] = meal;
  await sset('foods-list', STATE.foods);
  toast(cookedNum>0 ? `Meal saved — per 100g of ${round0(cookedNum)}g cooked weight` : 'Meal saved to master list');
  buildLines = [{foodId:'', grams:0}];
  buildCookedWeight = '';
  renderBuild(document.getElementById('tabroot'));
}

      <button class="btn secondary" onclick="plateLines.push({foodId:'',grams:0,assign:'shared'}); renderLog(document.getElementById('tabroot'))">+ Add ingredient</button>

function renderDayRemaining(person, cfg, date){
  const entries = (STATE.logs[date]||[]).filter(e=>e.person===person.id);
  const consumed = {cal:0,protein:0,carb:0,fat:0};
  entries.forEach(e=>{ consumed.cal+=e.cal; consumed.protein+=e.protein; consumed.carb+=e.carb; consumed.fat+=e.fat; });
  const target = mealTargets(person, cfg).day;
  const remaining = {
    cal: target.cal-consumed.cal, protein: target.protein-consumed.protein,
    carb: target.carb-consumed.carb, fat: target.fat-consumed.fat
  };
  const pct = clamp(consumed.cal/Math.max(target.cal,1)*100,0,140);
  return `
    <div class="person-card">
      <h3>${person.name}</h3>
      <div class="stat"><span>Cal</span><b>${round0(consumed.cal)} / ${round0(target.cal)} &middot; ${remaining.cal>=0?'+':''}${round0(remaining.cal)} left</b></div>
      <div class="bar-wrap"><div class="bar ${pct>100?'over':''}" style="width:${Math.min(pct,100)}%;"></div></div>
      <div class="stat"><span>P / C / F left</span><b>${round0(remaining.protein)} / ${round0(remaining.carb)} / ${round0(remaining.fat)}</b></div>
    </div>
  `;
}
function computeLinesTotals(lines){
  const totals = {grams:0}; NUTS.forEach(n=>totals[n]=0);
  lines.forEach(l=>{
    const f = STATE.foods[l.foodId];
    if(!f || !l.grams) return;
    const s = scaleFood(f, l.grams);
    NUTS.forEach(n=> totals[n]+=s[n]);
    totals.grams += l.grams;
  });
  return totals;
}
function alreadyLoggedFor(date, slot){
  const entries = (STATE.logs[date]||[]).filter(e=>e.slot===slot);
  const out = {};
  STATE.config.people.forEach(p=>{
    const mine = entries.filter(e=>e.person===p.id);
    const sums = {cal:0,protein:0,carb:0,fat:0};
    mine.forEach(e=>{ sums.cal+=e.cal; sums.protein+=e.protein; sums.carb+=e.carb; sums.fat+=e.fat; });
    out[p.id] = sums;
  });
  return out;
}
function personLineShare(person, personIdx, line, splitPct){
  const f = STATE.foods[line.foodId];
  if(!f || !line.grams) return {cal:0,protein:0,carb:0,fat:0,grams:0};
  if(line.assign==='shared'){
    const pct = personIdx===0 ? splitPct : (100-splitPct);
    const grams = line.grams*pct/100;
    return {...scaleFood(f,grams), grams};
  } else if(line.assign===person.id){
    return {...scaleFood(f,line.grams), grams:line.grams};
  }
  return {cal:0,protein:0,carb:0,fat:0,grams:0};
}
function renderPlatePersonCompare(person, cfg, lines, splitPct, already){
  const idx = cfg.people.findIndex(p=>p.id===person.id);
  const plate = {cal:0,protein:0,carb:0,fat:0};
  lines.forEach(l=>{
    const s = personLineShare(person, idx, l, splitPct);
    plate.cal+=s.cal; plate.protein+=s.protein; plate.carb+=s.carb; plate.fat+=s.fat;
  });
  const al = already[person.id] || {cal:0,protein:0,carb:0,fat:0};
  const target = mealTargets(person, cfg).meals[plateSlot];
  const combined = {
    cal: al.cal+plate.cal, protein: al.protein+plate.protein, carb: al.carb+plate.carb, fat: al.fat+plate.fat
  };
  const remaining = target.cal - combined.cal;
  const pct = clamp(combined.cal/Math.max(target.cal,1)*100,0,140);
  return `
    <div class="person-card">
      <h3>${person.name}</h3>
      <div class="stat"><span>This plate</span><b>${round0(plate.cal)} cal &middot; P${round0(plate.protein)} C${round0(plate.carb)} F${round0(plate.fat)}</b></div>
      ${al.cal>0?`<div class="stat"><span>Already logged (${plateSlot})</span><b>${round0(al.cal)} cal</b></div>`:''}
      <div class="stat"><span>Target (${plateSlot})</span><b>${round0(target.cal)} cal &middot; P${round0(target.protein)} C${round0(target.carb)} F${round0(target.fat)}</b></div>
      <div class="bar-wrap"><div class="bar ${pct>100?'over':''}" style="width:${Math.min(pct,100)}%;"></div></div>
      <div class="stat"><span>Remaining</span><b style="color:${remaining<0?'var(--bad)':'var(--good)'};">${remaining>=0?'+':''}${round0(remaining)} cal</b></div>
    </div>
  `;
}
async function commitPlate(){
  const cfg = STATE.config;
  const validLines = plateLines.filter(l=>l.foodId && l.grams>0);
  if(validLines.length===0){ toast('Add at least one ingredient with grams'); return; }
  if(!STATE.logs[plateDate]) STATE.logs[plateDate]=[];
  validLines.forEach(l=>{
    const f = STATE.foods[l.foodId];
    if(l.assign==='shared'){
      const g1 = l.grams*plateSplitPct/100, g2 = l.grams-g1;
      const s1 = scaleFood(f,g1), s2 = scaleFood(f,g2);
      STATE.logs[plateDate].push({id:uid(), person:cfg.people[0].id, slot:plateSlot, foodId:l.foodId, foodName:f.name, grams:g1, ...s1});
      STATE.logs[plateDate].push({id:uid(), person:cfg.people[1].id, slot:plateSlot, foodId:l.foodId, foodName:f.name, grams:g2, ...s2});
    } else {
      const s = scaleFood(f, l.grams);
      STATE.logs[plateDate].push({id:uid(), person:l.assign, slot:plateSlot, foodId:l.foodId, foodName:f.name, grams:l.grams, ...s});
    }
  });
  await sset('log:'+plateDate, STATE.logs[plateDate]);
  toast('Logged for both');
  plateLines = [{foodId:'', grams:0, assign:'shared'}];
  renderLog(document.getElementById('tabroot'));
}
function personName(pid){
  const p = STATE.config.people.find(p=>p.id===pid);
  return p? p.name : pid;
}
function renderLogSlot(slot, entries){
  const rows = entries.filter(e=>e.slot===slot);
  return `
    <div class="meal-slot-header"><h3>${slot}</h3></div>
    <div class="table-scroll"><table>
      <tr><th>Person</th><th>Item</th><th>Grams</th><th>Cal</th><th>P</th><th>C</th><th>F</th><th></th></tr>
      ${rows.map(e=>`
        <tr>
          <td>${personName(e.person)}</td>
          <td>${e.foodName}</td>
          <td class="mono">${round0(e.grams)}</td>
          <td class="mono">${round0(e.cal)}</td>
          <td class="mono">${round1(e.protein)}</td>
          <td class="mono">${round1(e.carb)}</td>
          <td class="mono">${round1(e.fat)}</td>
          <td><button class="btn danger" style="padding:2px 7px;" onclick="deleteLogEntry('${slot}','${e.id}')">×</button></td>
        </tr>
      `).join('') || `<tr><td colspan="8" class="empty">Nothing logged for ${slot} yet.</td></tr>`}
    </table></div>
  `;
}
async function deleteLogEntry(slot, id){
  STATE.logs[plateDate] = (STATE.logs[plateDate]||[]).filter(e=>e.id!==id);
  await sset('log:'+plateDate, STATE.logs[plateDate]);
  renderLog(document.getElementById('tabroot'));
}

// ============================================================
// TODAY TAB
// ============================================================
function renderToday(root){
  const cfg = STATE.config;
  const date = STATE.currentDate;
  const entries = STATE.logs[date]||[];
  root.innerHTML = `
    <div class="panel">
      <div class="row"><div><label>Date</label><input type="date" id="td-date" value="${date}" onchange="STATE.currentDate=this.value; renderToday(document.getElementById('tabroot'))"></div></div>
    </div>
    <div class="grid2">
      ${cfg.people.map(p=>renderPersonToday(p,cfg,entries)).join('')}
    </div>
  `;
}
function renderPersonToday(p, cfg, entries){
  const mt = mealTargets(p, cfg);
  const mine = entries.filter(e=>e.person===p.id);
  let runningRemainingCal = 0; // carries across meals
  const slotsHtml = ['breakfast','lunch','dinner'].map(slot=>{
    const rows = mine.filter(e=>e.slot===slot);
    const consumed = {cal:0,protein:0,carb:0,fat:0};
    rows.forEach(e=>{ consumed.cal+=e.cal; consumed.protein+=e.protein; consumed.carb+=e.carb; consumed.fat+=e.fat; });
    const target = mt.meals[slot];
    const allowance = target.cal + runningRemainingCal;
    const remaining = allowance - consumed.cal;
    runningRemainingCal = remaining;
    const pct = clamp(consumed.cal/Math.max(allowance,1)*100,0,140);
    return `
      <div style="margin-bottom:10px;">
        <div class="stat"><span style="text-transform:capitalize;">${slot}</span><b>${round0(consumed.cal)} / ${round0(allowance)} cal</b></div>
        <div class="bar-wrap"><div class="bar ${pct>100?'over':''}" style="width:${Math.min(pct,100)}%;"></div></div>
        <div class="stat"><span>P ${round1(consumed.protein)}/${round1(target.protein)} &middot; C ${round1(consumed.carb)}/${round1(target.carb)} &middot; F ${round1(consumed.fat)}/${round1(target.fat)}</span><span>${remaining>=0?'+':''}${round0(remaining)} left</span></div>
      </div>
    `;
  }).join('');
  const dayConsumed = {cal:0,protein:0,carb:0,fat:0,fibre:0};
  mine.forEach(e=>{ dayConsumed.cal+=e.cal; dayConsumed.protein+=e.protein; dayConsumed.carb+=e.carb; dayConsumed.fat+=e.fat; dayConsumed.fibre+=e.fibre||0; });
  const dayPct = clamp(dayConsumed.cal/Math.max(mt.day.cal,1)*100,0,140);
  const proteinPct = clamp(dayConsumed.protein/Math.max(mt.day.protein,1)*100,0,140);
  const carbPct = clamp(dayConsumed.carb/Math.max(mt.day.carb,1)*100,0,140);
  const fatPct = clamp(dayConsumed.fat/Math.max(mt.day.fat,1)*100,0,140);
  return `
    <div class="person-card">
      <h3>${p.name}</h3>
      ${slotsHtml}
      <div class="section-title" style="margin-top:14px;">Full day</div>
      <div class="stat"><span>Cal</span><b>${round0(dayConsumed.cal)} / ${round0(mt.day.cal)}</b></div>
      <div class="bar-wrap"><div class="bar ${dayPct>100?'over':''}" style="width:${Math.min(dayPct,100)}%;"></div></div>
      <div class="stat"><span>Protein</span><b>${round1(dayConsumed.protein)} / ${round1(mt.day.protein)}</b></div>
      <div class="bar-wrap"><div class="bar ${proteinPct>100?'over':''}" style="width:${Math.min(proteinPct,100)}%;"></div></div>
      <div class="stat"><span>Carb</span><b>${round1(dayConsumed.carb)} / ${round1(mt.day.carb)}</b></div>
      <div class="bar-wrap"><div class="bar ${carbPct>100?'over':''}" style="width:${Math.min(carbPct,100)}%;"></div></div>
      <div class="stat"><span>Fat</span><b>${round1(dayConsumed.fat)} / ${round1(mt.day.fat)}</b></div>
      <div class="bar-wrap"><div class="bar ${fatPct>100?'over':''}" style="width:${Math.min(fatPct,100)}%;"></div></div>
      <div class="stat"><span>Fibre</span><b>${round1(dayConsumed.fibre)} / ${p.fibreTarget?round0(p.fibreTarget):'—'}</b></div>
    </div>
  `;
}

// ============================================================
// WEEK TAB
// ============================================================
function renderWeek(root){
  const cfg = STATE.config;
  const dates = Object.keys(STATE.logs).sort().reverse().slice(0,7);
  root.innerHTML = `
    <div class="panel">
      <div class="section-title">Last ${dates.length} logged day${dates.length===1?'':'s'} — averages</div>
      <div class="grid2">
        ${cfg.people.map(p=>renderPersonWeek(p,cfg,dates)).join('')}
      </div>
    </div>
    <div class="panel">
      <div class="section-title">Day-by-day</div>
      <div class="table-scroll"><table>
        <tr><th>Date</th>${cfg.people.map(p=>`<th>${p.name} Cal</th>`).join('')}</tr>
        ${dates.map(d=>{
          const entries = STATE.logs[d]||[];
          return `<tr><td class="mono">${d}</td>${cfg.people.map(p=>{
            const c = entries.filter(e=>e.person===p.id).reduce((s,e)=>s+e.cal,0);
            return `<td class="mono">${round0(c)}</td>`;
          }).join('')}</tr>`;
        }).join('') || '<tr><td class="empty">No logged days yet.</td></tr>'}
      </table></div>
    </div>
  `;
}
function renderPersonWeek(p, cfg, dates){
  const mt = mealTargets(p,cfg);
  if(dates.length===0){
    return `<div class="person-card"><h3>${p.name}</h3><div class="empty">No data yet.</div></div>`;
  }
  const sums = {cal:0,protein:0,carb:0,fat:0,fibre:0,sugar:0,salt:0};
  dates.forEach(d=>{
    (STATE.logs[d]||[]).filter(e=>e.person===p.id).forEach(e=>{
      NUTS.forEach(n=> sums[n]+=e[n]||0);
    });
  });
  const n = dates.length;
  return `
    <div class="person-card">
      <h3>${p.name}</h3>
      <div class="table-scroll"><table>
        <tr><th></th>${NUTS.map(n=>`<th>${NUT_LABELS[n]}</th>`).join('')}</tr>
        <tr><td class="mono">Avg/day</td>${NUTS.map(k=>`<td class="mono">${round1(sums[k]/n)}</td>`).join('')}</tr>
        <tr><td class="mono">Target</td><td class="mono">${round0(mt.day.cal)}</td><td class="mono">${round1(mt.day.protein)}</td><td class="mono">${round1(mt.day.carb)}</td><td class="mono">${round1(mt.day.fat)}</td><td>—</td><td>—</td><td>—</td></tr>
      </table></div>
    </div>
  `;
}

// ============================================================
// DATA TAB — backup, restore, CSV export
// ============================================================
function renderData(root){
  const names = STATE.config.people.map(p=>p.name).join(' & ');
  const dayCount = Object.keys(STATE.logs).length;
  root.innerHTML = `
    <div class="panel">
      <div class="section-title">Backup everything</div>
      <p class="small">Save a complete copy of config, master list, and all logged days as a JSON file.</p>
      <button class="btn" onclick="downloadBackup()">Download backup</button>
    </div>

    <div class="panel">
      <div class="section-title">Restore a backup</div>
      <p class="small">Replace this shared data with a previous Shredder backup file. This overwrites current config, master list, and logs — for both ${names}.</p>
      <div class="row">
        <div><input type="file" id="restore-file" accept="application/json"></div>
      </div>
      <button class="btn secondary" onclick="restoreBackup()">Choose backup &amp; restore</button>
    </div>

    <div class="panel">
      <div class="section-title">Export spreadsheet</div>
      <p class="small">Download every logged entry (${dayCount} day${dayCount===1?'':'s'}) as a CSV for analysis.</p>
      <button class="btn" onclick="exportCSV()">Export CSV</button>
    </div>

    <div class="panel" style="background:var(--track);border:none;">
      <div class="section-title" style="border:none;margin:0 0 6px;">Stored data</div>
      <p class="small">Config, master list and logs live in shared app storage, keyed independently of this app's code — they persist when you update the app with new features. Backups above give you an external copy for safekeeping or analysis elsewhere.</p>
    </div>
  `;
}
async function downloadBackup(){
  const backup = {
    app:'shredder', exportedAt: new Date().toISOString(),
    config: STATE.config, foods: STATE.foods, logs: STATE.logs
  };
  const blob = new Blob([JSON.stringify(backup,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `shredder-backup-${todayStr()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Backup downloaded');
}
async function restoreBackup(){
  const input = document.getElementById('restore-file');
  if(!input.files || !input.files[0]){ toast('Choose a file first'); return; }
  try{
    const text = await input.files[0].text();
    const data = JSON.parse(text);
    if(!data.config || !data.foods){ toast("That file doesn't look like a Shredder backup"); return; }
    STATE.config = data.config;
    STATE.foods = data.foods;
    STATE.logs = data.logs || {};
    await sset('config', STATE.config);
    await sset('foods-list', STATE.foods);
    for(const date of Object.keys(STATE.logs)){
      await sset('log:'+date, STATE.logs[date]);
    }
    toast('Backup restored');
    render();
  }catch(e){
    console.error(e);
    toast('Could not read that file');
  }
}
function csvEscape(v){
  const s = String(v??'');
  return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
}
function exportCSV(){
  const rows = [['Date','Slot','Person','Food','Grams','Cal','Protein','Carb','Fat','Fibre','Sugar','Salt']];
  Object.keys(STATE.logs).sort().forEach(date=>{
    STATE.logs[date].forEach(e=>{
      rows.push([date, e.slot, personName(e.person), e.foodName, e.grams, e.cal, e.protein, e.carb, e.fat, e.fibre, e.sugar, e.salt]);
    });
  });
  const csv = rows.map(r=>r.map(csvEscape).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `shredder-log-${todayStr()}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('CSV exported');
}

// ---------- boot ----------
loadAll();
</script>
